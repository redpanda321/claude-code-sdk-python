name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build the wheel without publishing'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # OIDC trusted publishing to PyPI

jobs:
  publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs git history for version

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Build wheel + sdist
        run: uv build

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' || inputs.dry-run == false }}
        uses: pypa/gh-action-pypi-publish@release/v1
